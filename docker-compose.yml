version: "3.9"

services:
  api:
    build: .
    container_name: semantic-firewall-api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn semantic_firewall.apps.api_server:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    container_name: semantic-firewall-ui
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    command: streamlit run semantic_firewall/apps/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

